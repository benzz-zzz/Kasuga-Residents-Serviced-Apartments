<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060a14"/>
      <stop offset="1" stop-color="#0c1b2f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0" stop-color="#00f5d4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#00f5d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="220" r="320" fill="url(#glow)" filter="url(#soft)"/>

  <g fill="none" stroke="#1f3a52" stroke-opacity="0.55">
    <path d="M120 510 C 320 420, 440 560, 640 470 S 980 520, 1080 440" stroke-width="2"/>
    <path d="M60 430 C 280 340, 420 480, 620 390 S 980 450, 1140 360" stroke-width="1.5"/>
  </g>

  <g font-family="Plus Jakarta Sans, Arial, sans-serif">
    <text x="92" y="150" font-size="22" fill="#b8d9ff" opacity="0.92" letter-spacing="2">ABOUT</text>
    <text x="92" y="230" font-size="70" fill="#e8f4ff" font-weight="700">Kasuga Residences</text>
    <text x="92" y="295" font-size="34" fill="#cfe7ff" opacity="0.95" font-weight="600">Apartment living, run with boutique-hotel discipline</text>

    <g transform="translate(92 360)">
      <rect x="0" y="0" width="430" height="64" rx="16" fill="rgba(0,245,212,0.10)" stroke="#00f5d4" stroke-opacity="0.35"/>
      <text x="22" y="42" font-size="26" fill="#9fffea" font-weight="700">Comfort � Clarity � Human support</text>
    </g>
  </g>

  <g transform="translate(1000 78)">
    <circle cx="60" cy="60" r="56" fill="rgba(0,245,212,0.12)" stroke="#00f5d4" stroke-opacity="0.45"/>
    <text x="60" y="78" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="66" fill="#00f5d4">K</text>
  </g>
</svg>

